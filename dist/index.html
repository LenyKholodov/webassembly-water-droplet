<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        html {
        margin: 0px;
        height: 100%;
        width: 100%;
        }
        body {
        margin: 0 !important;
        padding: 0 !important;
        overflow: hidden;
        height: 100%;
        width: 100%;
        }
        canvas {
            height:100%;
            width:100%;
            display:block;
        }
        p {
            margin: 10pt;
        }

        /* live droplet tuning panel */
        #tuning {
            position: fixed; top: 8px; right: 8px; z-index: 10;
            width: 232px;
            background: rgba(10,16,20,0.82);
            color: #d8ecdc; font: 12px/1.35 -apple-system, system-ui, monospace;
            border: 1px solid rgba(120,200,150,0.35); border-radius: 8px;
            padding: 8px 10px 10px; user-select: none; -webkit-user-select: none;
            backdrop-filter: blur(3px);
        }
        #tuning h3 { margin: 0 0 6px; font-size: 12px; font-weight: 600; cursor: pointer; display:flex; justify-content:space-between; }
        #tuning h3 .caret { opacity: .7; }
        #tuning.collapsed #tuning-body { display: none; }
        #tuning .row { margin: 7px 0; }
        #tuning .lab { display: flex; justify-content: space-between; }
        #tuning .val { color: #8fe6a8; font-variant-numeric: tabular-nums; }
        #tuning input[type=range] { width: 100%; margin: 2px 0 0; accent-color: #5fd08a; height: 22px; }
        #tuning .btns { display:flex; gap:6px; margin-top:8px; }
        #tuning button {
            flex:1; font: 11px monospace; color:#d8ecdc; cursor:pointer;
            background: rgba(95,208,138,0.16); border:1px solid rgba(120,200,150,0.4);
            border-radius:6px; padding:5px 4px;
        }
        #tuning button:active { background: rgba(95,208,138,0.34); }
        #tuning .hint { opacity:.55; font-size:10px; margin-top:6px; }
    </style>
</head>

<body>
    <!-- Create the canvas that the C++ code will draw into -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <!-- Live droplet tuning: sets window.DROPLET.*, which the C++ reads each frame -->
    <div id="tuning">
        <h3 id="tuning-head">💧 droplet tuning <span class="caret">▾</span></h3>
        <div id="tuning-body"></div>
        <div class="btns">
            <button id="tuning-reset">reset</button>
            <button id="tuning-copy">copy C++</button>
        </div>
        <div class="hint">live; unset values use the compile defaults</div>
    </div>

    <!-- Allow the C++ to access the canvas element -->
    <script type='text/javascript'>
        var canv = document.getElementById('canvas');
        var isMusicPl = false;
        var Module = {
            canvas: canv,
            isMusicPlaying: isMusicPl
        };

        // --- droplet tuning sliders (read every frame by world.cpp via window.DROPLET) ---
        (function () {
            // key must match the names read in world.cpp refresh_live_tuning()
            var PARAMS = [
                { key: 'metaballRadius', label: 'metaball radius', min: 0.02, max: 0.20, step: 0.002, def: 0.052, cpp: 'DROPLET_RAYMARCH_PARTICLE_RADIUS' },
                { key: 'influence',      label: 'influence (merge)', min: 0.02, max: 0.30, step: 0.005, def: 0.13, cpp: 'DROPLET_INFLUENCE_RADIUS' },
                { key: 'iso',            label: 'iso threshold', min: -0.06, max: 0.10, step: 0.005, def: -0.04, cpp: 'DROPLET_ISO_THRESHOLD' },
                { key: 'force',          label: 'cohesion force', min: 0.08, max: 0.30, step: 0.005, def: 0.13, cpp: 'DROPLET_PARTICLE_FORCE' },
                { key: 'damping',        label: 'damping', min: 0.0, max: 0.04, step: 0.002, def: 0.002, cpp: 'DROPLET_PARTICLE_DAMPING' },
                { key: 'particlesPerDroplet', label: 'particles / droplet', min: 20, max: 400, step: 5, def: 30, intVal: true, cpp: 'particles/droplet' },
                { key: 'physicalRadius', label: 'physical radius', min: 0.02, max: 0.15, step: 0.005, def: 0.025, cpp: 'DROPLET_PARTICLE_RADIUS' }
            ];

            window.DROPLET = window.DROPLET || {};
            var body = document.getElementById('tuning-body');

            function fmt(v) { return (Math.round(v * 1000) / 1000).toString(); } // drops trailing zeros (ints show clean)

            PARAMS.forEach(function (p) {
                window.DROPLET[p.key] = p.def;
                var row = document.createElement('div'); row.className = 'row';
                row.innerHTML =
                    '<div class="lab"><span>' + p.label + '</span><span class="val" id="v-' + p.key + '">' + fmt(p.def) + '</span></div>' +
                    '<input type="range" id="s-' + p.key + '" min="' + p.min + '" max="' + p.max + '" step="' + p.step + '" value="' + p.def + '">';
                body.appendChild(row);
                var slider = row.querySelector('#s-' + p.key);
                var out = row.querySelector('#v-' + p.key);
                slider.addEventListener('input', function () {
                    var v = parseFloat(slider.value);
                    window.DROPLET[p.key] = v;
                    out.textContent = fmt(v);
                });
            });

            document.getElementById('tuning-reset').addEventListener('click', function () {
                PARAMS.forEach(function (p) {
                    window.DROPLET[p.key] = p.def;
                    document.getElementById('s-' + p.key).value = p.def;
                    document.getElementById('v-' + p.key).textContent = fmt(p.def);
                });
            });

            document.getElementById('tuning-copy').addEventListener('click', function () {
                var lines = PARAMS.map(function (p) {
                    var v = window.DROPLET[p.key];
                    return p.intVal ? (p.cpp + ' = ' + Math.round(v)) : (p.cpp + ' = ' + fmt(v) + 'f;');
                });
                var text = lines.join('\n');
                if (navigator.clipboard) navigator.clipboard.writeText(text);
                console.log('[droplet tuning]\n' + text);
                var b = document.getElementById('tuning-copy'); var t = b.textContent;
                b.textContent = 'copied!'; setTimeout(function () { b.textContent = t; }, 900);
            });

            // collapse/expand (handy on mobile)
            var panel = document.getElementById('tuning');
            document.getElementById('tuning-head').addEventListener('click', function () {
                panel.classList.toggle('collapsed');
                panel.querySelector('.caret').textContent = panel.classList.contains('collapsed') ? '▸' : '▾';
            });
        })();

    </script>

    <!-- Call the javascript glue code (index.js) as generated by Emscripten -->
    <script src="index.js"></script>
</body>

</html>
