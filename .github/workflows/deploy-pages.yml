name: Deploy demo to GitHub Pages

# Builds the WebAssembly bundle with Emscripten and publishes dist/ to GitHub Pages.
# Build artifacts (index.js/.wasm/.data) are gitignored, so CI builds them on each push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive   # pulls third-party/fast_obj

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Build (release)
        run: make RELEASE=1 -j   # RELEASE drops the localhost source-map base + shrinks the wasm

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # enables Pages (source = GitHub Actions) on first run

      - name: Upload dist/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
